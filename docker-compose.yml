services:
  mongo:
    image: mongo:7
    container_name: chesstalk-mongo
    ports:
      - "27017:27017"
    volumes:
      - chesstalk-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chesstalk-mongo-data:
